<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <title>Photobooth</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Rein dekorative, rotierende Kompass-Deko im Hintergrund (angelehnt an
       ateez-sendoff-tool/tools/vjing, aber ohne Musikreaktion, siehe Plan).
       Steht bewusst VOR #app im Markup: #app setzt kein eigenes background/
       position/z-index und bildet daher keinen eigenen Stacking-Context, die
       Deko wird so automatisch zuerst gemalt und scheint nur durch die
       transparenten Zwischenraeume von #app (Padding/Gaps) durch.
       aria-hidden + pointer-events:none, da rein optisch, keine Interaktion. -->
  <div class="compass-decor compass-decor--left" aria-hidden="true">
    <span class="compass-ring"></span>
    <span class="compass-ring"></span>
    <span class="compass-ring"></span>
  </div>
  <div class="compass-decor compass-decor--right" aria-hidden="true">
    <span class="compass-ring"></span>
    <span class="compass-ring"></span>
    <span class="compass-ring"></span>
  </div>

  <div id="app">

    <!-- Ein einziger Toggle-Schalter statt zweier getrennter Links, um in
         den Einstellungsmodus rein und wieder raus zu kommen (siehe
         settings.js). Bleibt per position:fixed in beiden Modi sichtbar. -->
    <label id="settings-toggle-label" for="settings-toggle">
      <span class="settings-toggle-text">Einstellungen</span>
      <input type="checkbox" id="settings-toggle" />
      <span class="settings-toggle-switch" aria-hidden="true"></span>
    </label>

    <!-- Stage: Style-Panels + Kamera als Flex-Gruppe statt fester Grid-
         Spalten, damit die Panels direkt am Kamerabild anliegen statt am
         Rand der (breiteren) Spalte - das Kamerabild ist durch sein eigenes
         2:3-Seitenverhaeltnis oft schmaler als seine Spalte, vorher liess
         das einen grossen Leerraum zwischen Panels und Bild entstehen. -->
    <div id="stage">
      <!-- Style-Auswahl links: wird ab Schritt 3 dynamisch per JS aus
           GET /styles befuellt (app.js) - keine hartcodierte Anzahl mehr. -->
      <div id="style-panel-left" class="style-panel"></div>

      <!-- Mittlerer, dominanter Bereich: hier haengt sich der p5-Canvas ein
           (Live-Webcam-Vorschau kommt in Schritt 2). -->
      <div id="camera-area">
        <!-- p5 erzeugt das <canvas> per JS und haengt es hier ein -->
      </div>

      <div id="style-panel-right" class="style-panel"></div>

      <!-- Einstellungs-Spalte: nur sichtbar, wenn #app die Klasse
           "settings-mode" traegt (siehe settings.js/style.css). Kein
           Login-Schritt mehr davor - direkt die Stile-Verwaltung. -->
      <div id="settings-panel">
        <h2>Stile</h2>
        <!-- Kein eigenes Stile-Grid mehr - die Auswahl, welcher Stil
             bearbeitet wird, laeuft direkt ueber die Stil-Thumbnails links
             neben der Kamera (inkl. "+"-Kachel im Settings-Modus, siehe
             app.js/settings.js). Hier nur noch das Formular. -->
        <div id="style-editor"></div>
      </div>
    </div>

    <!-- Aktionsleiste unten: Aufnahme- und Upload-Option nebeneinander,
         laut Spezifikation beide Wege ueber dasselbe Interface. -->
    <div id="action-bar">
      <button id="capture-button">Foto aufnehmen</button>
      <button id="upload-button">Foto hochladen</button>
      <!-- Verstecktes natives File-Input - wird per JS ueber den
           "Foto hochladen"-Button ausgeloest (input.click()), damit das
           Styling einheitlich ueber den eigenen Button laeuft statt
           ueber das haessliche Standard-Aussehen von <input type="file">. -->
      <input type="file" id="upload-input" accept="image/*" hidden />
    </div>

    <!-- Vorschau-Overlay (Schritt 4): zeigt das aufgenommene/hochgeladene
         Foto vor dem Absenden, mit Bestaetigen/Neu-aufnehmen-Wahl - das ist
         der in FRONTEND_CONTEXT.md genannte "kleine Bestaetigungsschritt". -->
    <div id="photo-preview-overlay" class="overlay hidden">
      <div class="overlay-content">
        <img id="photo-preview-image" src="" alt="Aufgenommenes Foto" />
        <div class="overlay-buttons">
          <button id="retake-photo-button">Neu aufnehmen</button>
          <button id="confirm-photo-button">Bestätigen</button>
        </div>
      </div>
    </div>

    <!-- Lade-Overlay: waehrend POST /generate verarbeitet wird und der
         Status gepollt wird. loading-step-text zeigt den aktuellen
         Verarbeitungsschritt (kommt vom Backend, das ihn ueber eine eigene
         WebSocket-Verbindung zu ComfyUI ermittelt - siehe comfy-ws.js).
         Faellt auf die Punkt-Animation zurueck, solange noch keine
         Fortschrittsdaten vorliegen (z.B. Job steht noch in der Warteschlange). -->
    <div id="loading-overlay" class="overlay hidden">
      <div class="overlay-content">
        <p id="loading-step-text">Dein Foto wird generiert<span class="loading-dots"></span></p>
        <p class="loading-hint">Dauert erfahrungsgemaess ca. 15-20 Sekunden</p>
      </div>
    </div>

    <!-- Fehler-Overlay (Schritt 5): bei status "error" oder Netzwerkfehlern -
         einfache Meldung + Rueckweg zur Live-Vorschau, kein Retry-Automatismus. -->
    <div id="error-overlay" class="overlay hidden">
      <div class="overlay-content">
        <p>Da ist leider etwas schiefgelaufen.</p>
        <button id="error-back-button">Zurück zur Kamera</button>
      </div>
    </div>

    <!-- Ergebnis-Overlay: liegt ueber der gesamten Seite, zeigt ab Schritt 5
         das von ComfyUI generierte Bild. -->
    <div id="result-overlay" class="overlay hidden">
      <div class="overlay-content">
        <img id="result-image" src="" alt="Generiertes Ergebnis" />
        <div class="overlay-buttons">
          <button id="download-result-button">Herunterladen</button>
          <button id="close-overlay-button">Schließen</button>
        </div>
      </div>
    </div>

  </div>

  <script src="p5.min.js"></script>
  <script src="sketch.js"></script>
  <script src="app.js"></script>
  <script src="settings.js"></script>
</body>
</html>
